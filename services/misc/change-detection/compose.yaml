version: '3.2'

networks:    
  changedetection-bridge:
    driver: bridge
  frontend:
    external: true

services:
  changedetection:
    image: ghcr.io/dgtlmoon/changedetection.io:latest
    container_name: changedetection
    volumes:
      - /docker-data/changedetection.io/:/datastore
    environment:
      - PORT=5000
      - PUID=1000
      - PGID=1000
      - PLAYWRIGHT_DRIVER_URL=ws://browser-sockpuppet-chrome:3000/
      - HIDE_REFERER=true
      - TZ=America/New_York
    ports:
      - 5000:5000
    restart: unless-stopped
    depends_on:
      browser-sockpuppet-chrome:
        condition: service_started
    networks:
      - changedetection-bridge
      - frontend
    labels:
      traefik.enable: true
      traefik.http.routers.changedetection.rule: Host(`changedetection.${DOMAINNAME}`)
      traefik.http.routers.changedetection.entrypoints: websecure
      traefik.http.routers.changedetection.tls: true
      traefik.http.routers.changedetection.tls.certresolver: letencrypt
      traefik.http.services.changedetection.loadbalancer.server.port: 80

  browser-sockpuppet-chrome:
    hostname: browser-sockpuppet-chrome
    image: dgtlmoon/sockpuppetbrowser:latest
    restart: unless-stopped
    environment:
        - SCREEN_WIDTH=1920
        - SCREEN_HEIGHT=1024
        - SCREEN_DEPTH=16
        - MAX_CONCURRENT_CHROME_PROCESSES=10
        - DEFAULT_BLOCK_ADS=true
        - DEFAULT_STEALTH=true
        - DEFAULT_IGNORE_HTTPS_ERRORS=true
        - CHROME_FLAGS=--no-sandbox --disable-gpu --disable-dev-shm-usage
    networks:
      - changedetection-bridge
    logging:
      driver: "none"