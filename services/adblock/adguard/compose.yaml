services:
  adguard:
    image: adguard/adguardhome
    container_name: adguard
    ports:
      - 53:53/tcp # plain dns over tcp
      - 53:53/udp # plain dns over udp
      - 3000:3000/tcp # initial setup web interface
    volumes:
      - /docker-data/adguard/config:/opt/adguardhome/conf # app configuration
      - /docker-data/adguard/work:/opt/adguardhome/work # app working directory