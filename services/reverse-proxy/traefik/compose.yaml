volumes:
  traefik:
    name: traefik

networks:
  frontend:
    name: frontend
  autheliaBridge: {}

services:
  traefik:
    image: traefik
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - --api=true
      - --api.dashboard=true
      # --api.insecure=true
      - --global.sendAnonymousUsage=false
      - --global.checkNewVersion=false
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entryPoints.web.address=:80/tcp
      - --entryPoints.websecure.address=:443/tcp
      # Listen for dynamic configurations outside of docker
      - --providers.file.directory=/config/dynamic
      - --providers.file.watch=true
      # HTTP to HTTPS Redirection
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https 
      # DNS Challenge Configuration (Cloudflare)
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.email=${CF_API_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/certs/acme.json
      # Logging
      # --log.level=DEBUG # DEBUG, PANIC, FATAL, ERROR, WARN, INFO
    environment:
      - TZ=America/New_York
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    ports:
      - 80:80 # HTTP entryPoints
      - 443:443 # HTTPS entryPoints
      - 8091:8080 # Dashboard WebGui
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik:/certs
      - /docker-data/traefik/dynamic:/config/dynamic
    labels:
      traefik.enable: true
      traefik.http.routers.api.rule: 'Host(`traefik.${DOMAINNAME}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))'
      traefik.http.routers.api.entryPoints: websecure
      traefik.http.routers.api.tls: true
      traefik.http.routers.api.service: api@internal
      traefik.http.routers.api.middlewares: authelia@docker
      traefik.http.routers.api.tls.certresolver: cloudflare
      traefik.http.routers.api.tls.domains[0].main: '${DOMAINNAME}'
      traefik.http.routers.api.tls.domains[0].sans: '*.${DOMAINNAME}'
    depends_on:
      - authelia
    networks:
      - frontend

  authelia:
    image: authelia/authelia
    container_name: authelia
    volumes:
      - /docker-data/authelia/authelia-config:/config
      - /docker-data/authelia/secrets:/secrets
    networks:
      - frontend
      - autheliaBridge
    ports:
      - 9091:9091
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      - AUTHELIA_NOTIFIER_SMTP_PASSWORD_FILE=/secrets/SMTP_PASSWORD
      - AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE=/secrets/ENCRYPTION_KEY
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE=/secrets/JWT_SECRET
      - AUTHELIA_SESSION_SECRET_FILE=/secrets/SESSION_SECRET
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    labels:
      traefik.enable: 'true'
      traefik.http.routers.authelia.rule: 'Host(`authelia.${DOMAINNAME}`)'
      traefik.http.routers.authelia.entryPoints: 'websecure'
      traefik.http.routers.authelia.tls: 'true'
      traefik.http.routers.authelia.tls.certresolver: 'cloudflare'
      traefik.http.routers.authelia.service: authelia-svc
      traefik.http.services.authelia-svc.loadbalancer.server.port: 9091
      traefik.http.middlewares.authelia.forwardAuth.address: 'http://authelia:9091/api/authz/forward-auth'
      traefik.http.middlewares.authelia.forwardAuth.trustForwardHeader: 'true'
      traefik.http.middlewares.authelia.forwardAuth.authResponseHeaders: 'Remote-User,Remote-Groups,Remote-Email,Remote-Name'

  redis:
    image: redis:alpine
    container_name: redis_authelia
    networks:
      - autheliaBridge
    volumes:
      - /docker-data/authelia/redis-data:/data
    expose:
      - 6379
    restart: unless-stopped
    environment:
      - TZ=America/New_York
      - PUID=1000
      - PGID=1000
